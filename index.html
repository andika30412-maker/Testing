<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>SFS VOID · TRIPLE BADGE SYSTEM</title>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<!-- Fonts & Icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: radial-gradient(ellipse at top, #0B0F1C, #030712);
  font-family: 'Inter', sans-serif;
  color: #F1F5F9;
  padding-bottom: 90px;
}
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: #1E293B; }
::-webkit-scrollbar-thumb { background: #FBBF24; border-radius: 10px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  background: rgba(3, 7, 18, 0.9);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(251, 191, 36, 0.3);
  position: sticky;
  top: 0;
  z-index: 30;
}
header div:first-child, header div:last-child {
  background: rgba(255,255,255,0.05);
  width: 42px;
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 30px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 1.2rem;
}
header div:first-child:hover, header div:last-child:hover {
  background: #FBBF24;
  color: #030712;
  transform: scale(0.94);
}
header div:nth-child(2) {
  font-size: 1.5rem;
  font-weight: 800;
  background: linear-gradient(135deg, #FFFFFF, #FBBF24, #FFD700, #A855F7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.search-wrap { padding: 16px 18px 8px; }
#search {
  width: 100%;
  padding: 14px 20px;
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 60px;
  color: white;
  font-size: 0.95rem;
  outline: none;
  transition: all 0.2s;
}
#search:focus { border-color: #FBBF24; box-shadow: 0 0 0 3px rgba(251,191,36,0.2); }

.grid-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 22px;
  padding: 16px 20px;
}
.card {
  background: rgba(15, 23, 42, 0.7);
  backdrop-filter: blur(8px);
  border-radius: 28px;
  overflow: hidden;
  border: 1px solid rgba(51, 65, 85, 0.5);
  transition: all 0.3s ease;
  box-shadow: 0 10px 25px -8px rgba(0,0,0,0.4);
}
.card:hover { transform: translateY(-6px); border-color: #FBBF24; box-shadow: 0 20px 30px -12px black; }
.card-img { width: 100%; height: 220px; object-fit: cover; background: #0F172A; }
.card-content { padding: 18px 16px 20px; }
.card h3 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 8px;
}
.badge-cat {
  background: #FBBF2420;
  color: #FCD34D;
  font-size: 0.7rem;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 40px;
}
.desc-text { color: #94A3B8; font-size: 0.85rem; margin: 8px 0 10px; line-height: 1.4; }
.meta-user {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.75rem;
  color: #94A3B8;
  margin: 12px 0 14px;
  border-top: 1px solid #33415540;
  padding-top: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.user-name {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}

/* ========= 3 JENIS CENTANG YANG BISA DIBAGIKAN ========= */
/* 1. CENTANG BIRU (Verified) */
.badge-blue {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: #1E3A8A60;
  padding: 2px 10px;
  border-radius: 40px;
  font-size: 0.65rem;
  font-weight: 600;
  color: #93C5FD;
  border: 1px solid #3B82F6;
}
.badge-blue i { color: #3B82F6; font-size: 0.7rem; }

/* 2. CENTANG GOLD (Super Admin) */
.badge-gold {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: linear-gradient(135deg, #FBBF24, #D97706);
  padding: 2px 12px;
  border-radius: 40px;
  font-size: 0.65rem;
  font-weight: 800;
  color: #0F172A;
  box-shadow: 0 0 10px #FBBF24;
  animation: pulseGold 2s infinite;
}
.badge-gold i { color: #FFD700; font-size: 0.7rem; }
@keyframes pulseGold {
  0% { box-shadow: 0 0 0 0 rgba(251,191,36,0.4); }
  70% { box-shadow: 0 0 0 5px rgba(251,191,36,0); }
  100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
}

/* 3. CENTANG BLACKHOLE (Owner Tertinggi) */
.badge-blackhole {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: #000000cc;
  backdrop-filter: blur(4px);
  padding: 2px 12px;
  border-radius: 40px;
  font-size: 0.65rem;
  font-weight: 800;
  color: #E0E7FF;
  border: 1px solid #A855F7;
  box-shadow: 0 0 12px #6D28D9;
  animation: blackholeGlow 2s infinite;
}
.badge-blackhole i { color: #A855F7; font-size: 0.7rem; }
@keyframes blackholeGlow {
  0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.5); border-color: #8B5CF6; }
  50% { box-shadow: 0 0 0 5px rgba(139,92,246,0.2); border-color: #C084FC; }
  100% { box-shadow: 0 0 0 0 rgba(139,92,246,0); border-color: #8B5CF6; }
}

.rocket-badge {
  background: #FBBF2420;
  padding: 2px 8px;
  border-radius: 40px;
  font-size: 0.65rem;
  color: #FBBF24;
}
.btn-open {
  background: linear-gradient(100deg, #FBBF24, #D97706);
  border: none;
  padding: 12px;
  border-radius: 40px;
  font-weight: 700;
  width: 100%;
  color: #030712;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: 0.2s;
}
.btn-open:hover { background: #D97706; color: white; transform: scale(0.98); }
#addBtn {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 58px;
  height: 58px;
  border-radius: 40px;
  background: #FBBF24;
  border: none;
  font-size: 28px;
  color: #030712;
  box-shadow: 0 8px 20px #FBBF2460;
  cursor: pointer;
  z-index: 40;
  display: flex;
  align-items: center;
  justify-content: center;
}
#addBtn:hover { transform: scale(1.07); background: #D97706; color: white; }

.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(12px);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.box {
  background: #0F172A;
  border-radius: 32px;
  width: 92%;
  max-width: 520px;
  padding: 24px;
  border: 1px solid #FBBF2460;
  max-height: 90vh;
  overflow-y: auto;
}
.box h3 {
  font-size: 1.6rem;
  font-weight: 700;
  margin-bottom: 20px;
  background: linear-gradient(135deg, #F1F5F9, #FBBF24, #A855F7);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
input, select, textarea {
  width: 100%;
  padding: 12px 16px;
  margin: 8px 0 14px;
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 28px;
  color: white;
  font-size: 0.9rem;
  outline: none;
}
textarea { border-radius: 20px; resize: vertical; min-height: 70px; }
button {
  border: none;
  border-radius: 40px;
  padding: 12px;
  font-weight: 600;
  margin-top: 8px;
  cursor: pointer;
}
.btn-primary { background: #FBBF24; color: #030712; width: 100%; font-weight: 800; }
.btn-secondary { background: #334155; color: white; width: 100%; }
.btn-danger { background: #DC2626; color: white; }
.btn-purple { background: #6D28D9; color: white; width: 100%; }
.admin-card {
  background: #0B1120;
  border-radius: 24px;
  padding: 18px;
  margin-bottom: 20px;
  border-left: 4px solid #FBBF24;
}
.admin-actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
.empty-state { text-align: center; padding: 50px; color: #64748B; }
.badge-list { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.user-badge-btn { padding: 6px 12px; border-radius: 40px; font-size: 0.7rem; cursor: pointer; transition: 0.2s; }
</style>
</head>
<body>

<header>
  <div><i class="fas fa-crown"></i></div>
  <div>SFS VOID</div>
  <div><i class="fas fa-plus"></i></div>
</header>

<div class="search-wrap">
  <input type="text" id="search" placeholder="🔍 Cari nama item, user, atau kategori...">
</div>
<div id="list" class="grid-list"></div>
<button id="addBtn"><i class="fas fa-plus-circle"></i></button>

<!-- MODAL TAMBAH ITEM -->
<div class="modal" id="addModal">
  <div class="box">
    <h3><i class="fas fa-upload"></i> Upload Koleksi</h3>
    <input id="user" placeholder="📛 Nama panggilan (alias bebas) *" value="">
    <input id="name" placeholder="🏷️ Nama item *">
    <textarea id="desc" placeholder="📝 Deskripsi (opsional)"></textarea>
    <input id="link" placeholder="🔗 Link URL">
    <select id="cat">
      <option>Rocket</option><option>Tank</option><option>Pesawat</option>
      <option>Satellite</option><option>Kapal Bawah Laut</option>
    </select>
    <div style="margin: 6px 0 6px;"><i class="fas fa-image"></i> Gambar (wajib)</div>
    <input type="file" id="img" accept="image/*">
    <button class="btn-primary" onclick="addData()"><i class="fas fa-save"></i> SIMPAN</button>
    <button class="btn-secondary" onclick="closeAdd()"><i class="fas fa-times"></i> BATAL</button>
  </div>
</div>

<!-- LOGIN ADMIN (3 LEVEL) -->
<div class="modal" id="loginModal">
  <div class="box">
    <h3><i class="fas fa-crown"></i> <span style="color:#FBBF24;">★ ADMIN ACCESS ★</span></h3>
    <input type="password" id="pass" placeholder="Masukkan kunci akses">
    <button class="btn-primary" onclick="login()"><i class="fas fa-key"></i> LOGIN</button>
    <button class="btn-secondary" onclick="closeLoginModal()">Tutup</button>
  </div>
</div>

<!-- ADMIN PANEL (BAGIKAN CENTANG BIRU, GOLD, BLACKHOLE) -->
<div class="modal" id="adminModal">
  <div class="box" style="max-width: 750px; max-height: 85vh;">
    <h3 id="adminTitle"><i class="fas fa-crown"></i> Admin Panel</h3>
    <div id="adminBadgeInfo" style="margin-bottom: 18px; padding: 10px; border-radius: 20px; text-align: center;"></div>
    
    <!-- Bagikan Centang ke User -->
    <div style="background: #1E293B; border-radius: 24px; padding: 16px; margin-bottom: 20px;">
      <h4><i class="fas fa-share-alt"></i> Bagikan Centang ke User</h4>
      <div id="userBadgeManager" class="badge-list"></div>
    </div>
    
    <!-- Misi Harian Tersembunyi -->
    <div style="background:#1E293B; border-radius: 24px; padding: 14px; margin-bottom: 20px; border:1px solid #FBBF2440;">
      <div style="display: flex; justify-content: space-between;">
        <span><i class="fas fa-rocket" style="color:#FBBF24;"></i> <strong>🎯 Misi Harian (Tersembunyi)</strong></span>
        <span id="rocketMissionStatus" style="font-size:12px; background:#334155; padding:4px 12px; border-radius:20px;"></span>
      </div>
      <div style="font-size:13px; margin-top: 10px;">
        📌 Upload <strong style="color:#FBBF24;">1000 item ROCKET</strong> hari ini: 
        <span id="todayRocketCount">0</span>/1000
      </div>
    </div>
    
    <div id="adminList"></div>
    <button class="btn-secondary" onclick="closeAdmin()"><i class="fas fa-arrow-left"></i> Keluar</button>
  </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDopQmdMEUdt-UFtbYZh76Y-2Wf17yL4T4",
  authDomain: "sfs-share-37061.firebaseapp.com",
  databaseURL: "https://sfs-share-37061-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sfs-share-37061"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref("items");
// Badge system: blue, gold, blackhole
const blueBadgeRef = firebase.database().ref("badges/blue");
const goldBadgeRef = firebase.database().ref("badges/gold");
const blackholeBadgeRef = firebase.database().ref("badges/blackhole");

let globalData = {};
let blueUsers = new Set();    // centang biru
let goldUsers = new Set();    // centang gold
let blackholeUsers = new Set(); // centang blackhole

let currentAdminLevel = null; // 'blackhole', 'gold', null

// Load all badges
Promise.all([
  blueBadgeRef.once("value"), goldBadgeRef.once("value"), blackholeBadgeRef.once("value")
]).then(([blueSnap, goldSnap, blackSnap]) => {
  blueUsers = new Set(Object.keys(blueSnap.val() || {}));
  goldUsers = new Set(Object.keys(goldSnap.val() || {}));
  blackholeUsers = new Set(Object.keys(blackSnap.val() || {}));
  filterAndRender();
});
// Realtime badge updates
blueBadgeRef.on("value", snap => { blueUsers = new Set(Object.keys(snap.val() || {})); filterAndRender(); if(adminModal.style.display === 'flex') buildAdminUI(); });
goldBadgeRef.on("value", snap => { goldUsers = new Set(Object.keys(snap.val() || {})); filterAndRender(); if(adminModal.style.display === 'flex') buildAdminUI(); });
blackholeBadgeRef.on("value", snap => { blackholeUsers = new Set(Object.keys(snap.val() || {})); filterAndRender(); if(adminModal.style.display === 'flex') buildAdminUI(); });

db.on("value", snap => { globalData = snap.val() || {}; filterAndRender(); if(adminModal.style.display === 'flex') buildAdminUI(); });

function filterAndRender() {
  const keyword = document.getElementById("search").value.toLowerCase();
  let entries = Object.entries(globalData);
  if (keyword.trim()) {
    entries = entries.filter(([id, item]) =>
      (item.name?.toLowerCase().includes(keyword)) ||
      (item.user?.toLowerCase().includes(keyword)) ||
      (item.cat?.toLowerCase().includes(keyword)) ||
      (item.desc?.toLowerCase().includes(keyword))
    );
  }
  renderCards(entries);
}

function getBadgeHtml(username) {
  if (blackholeUsers.has(username)) return '<span class="badge-blackhole"><i class="fas fa-black-hole"></i> BLACKHOLE</span>';
  if (goldUsers.has(username)) return '<span class="badge-gold"><i class="fas fa-crown"></i> SUPER GOLD</span>';
  if (blueUsers.has(username)) return '<span class="badge-blue"><i class="fas fa-check-circle"></i> VERIFIED</span>';
  return '';
}

function renderCards(entries) {
  const container = document.getElementById("list");
  if (!entries.length) {
    container.innerHTML = `<div class="empty-state"><i class="fas fa-crown" style="font-size:3rem; color:#FBBF24;"></i><p>Tidak ada hasil</p></div>`;
    return;
  }
  container.innerHTML = entries.map(([id, r]) => `
    <div class="card">
      <img class="card-img" src="${r.img || 'https://placehold.co/400x200?text=No+Image'}" loading="lazy">
      <div class="card-content">
        <h3>${escapeHtml(r.name || 'Tanpa Nama')} <span class="badge-cat">${escapeHtml(r.cat)}</span></h3>
        ${r.desc ? `<div class="desc-text">${escapeHtml(r.desc)}</div>` : ''}
        <div class="meta-user">
          <div class="user-name"><i class="fas fa-user"></i> ${escapeHtml(r.user)} ${getBadgeHtml(r.user)}</div>
          <div><i class="fas fa-calendar"></i> ${r.timestamp ? new Date(r.timestamp).toLocaleDateString('id') : 'Baru'}</div>
          ${r.cat === 'Rocket' ? '<span class="rocket-badge"><i class="fas fa-rocket"></i> Rocket</span>' : ''}
        </div>
        <button class="btn-open" onclick="window.open('${escapeHtml(r.link || '#')}','_blank')"><i class="fas fa-external-link-alt"></i> BUKA ITEM</button>
      </div>
    </div>
  `).join("");
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

function addData() {
  const file = document.getElementById("img").files[0];
  if (!file) return alert("⚠️ Gambar wajib!");
  const userName = document.getElementById("user").value.trim();
  if (!userName) return alert("⚠️ Nama panggilan wajib diisi!");
  const itemName = document.getElementById("name").value.trim();
  if (!itemName) return alert("Nama item wajib!");
  const reader = new FileReader();
  reader.onload = e => {
    db.push({
      user: userName, name: itemName, desc: document.getElementById("desc").value.trim() || "",
      link: document.getElementById("link").value.trim() || "#", cat: document.getElementById("cat").value,
      img: e.target.result, timestamp: Date.now()
    }).then(() => { closeAdd(); clearForm(); updateRocketMission(); });
  };
  reader.readAsDataURL(file);
}
function clearForm() {
  document.getElementById("user").value = "";
  document.getElementById("name").value = "";
  document.getElementById("desc").value = "";
  document.getElementById("link").value = "";
  document.getElementById("img").value = "";
}
function getTodayRocketCount() {
  const today = new Date(); today.setHours(0,0,0,0);
  return Object.values(globalData).filter(i => i.cat === "Rocket" && i.timestamp >= today.getTime()).length;
}
function updateRocketMission() {
  const rocket = getTodayRocketCount();
  if(document.getElementById("todayRocketCount")) document.getElementById("todayRocketCount").innerText = rocket;
  const statusSpan = document.getElementById("rocketMissionStatus");
  if(statusSpan) statusSpan.innerHTML = rocket >= 1000 ? '✅ Misi Berhasil!' : '⏳ Belum tercapai';
}

// LOGIN MULTI LEVEL
function openAdmin() { document.getElementById("loginModal").style.display = "flex"; }
function closeLoginModal() { document.getElementById("loginModal").style.display = "none"; }
function login() {
  const pass = document.getElementById("pass").value;
  if (pass === "1113292627") currentAdminLevel = 'blackhole';
  else if (pass === "gold12345") currentAdminLevel = 'gold';
  else { alert("Password salah!"); return; }
  document.getElementById("loginModal").style.display = "none";
  buildAdminUI();
  updateRocketMission();
  document.getElementById("adminModal").style.display = "flex";
}

function buildAdminUI() {
  const container = document.getElementById("adminList");
  const title = document.getElementById("adminTitle");
  const badgeInfo = document.getElementById("adminBadgeInfo");
  if(currentAdminLevel === 'blackhole') {
    title.innerHTML = '<i class="fas fa-black-hole"></i> BLACKHOLE OWNER';
    badgeInfo.innerHTML = '<span class="badge-blackhole">BLACKHOLE ACCESS</span> — Bisa bagikan SEMUA centang (Biru, Gold, Blackhole) & hapus item';
  } else {
    title.innerHTML = '<i class="fas fa-crown" style="color:#FBBF24;"></i> SUPER GOLD ADMIN';
    badgeInfo.innerHTML = '<span class="badge-gold">GOLD ACCESS</span> — Bisa bagikan centang Biru & Gold (tidak bisa Blackhole)';
  }
  
  // Ambil semua user unik dari item
  const allUsers = new Set(Object.values(globalData).map(i => i.user));
  // User badge manager
  let userBadgeHtml = '';
  for(let user of allUsers) {
    const hasBlue = blueUsers.has(user);
    const hasGold = goldUsers.has(user);
    const hasBlack = blackholeUsers.has(user);
    userBadgeHtml += `<div style="background:#0B1120; border-radius:20px; padding:10px; margin-bottom:10px;">
      <strong><i class="fas fa-user"></i> ${escapeHtml(user)}</strong>
      <div style="display:flex; gap:8px; margin-top:8px; flex-wrap:wrap;">
        <button onclick="giveBadge('${escapeAttr(user)}', 'blue')" style="background:${hasBlue ? '#22C55E' : '#1E3A8A'}; padding:6px 14px; border-radius:30px;">
          <i class="fas fa-check-circle"></i> Centang Biru ${hasBlue ? '✓' : ''}
        </button>`;
    if(currentAdminLevel === 'blackhole' || currentAdminLevel === 'gold') {
      userBadgeHtml += `<button onclick="giveBadge('${escapeAttr(user)}', 'gold')" style="background:${hasGold ? '#FBBF24' : '#78350F'}; padding:6px 14px; border-radius:30px;">
        <i class="fas fa-crown"></i> Centang Gold ${hasGold ? '✓' : ''}
      </button>`;
    }
    if(currentAdminLevel === 'blackhole') {
      userBadgeHtml += `<button onclick="giveBadge('${escapeAttr(user)}', 'blackhole')" style="background:${hasBlack ? '#6D28D9' : '#2D1B4E'}; padding:6px 14px; border-radius:30px;">
        <i class="fas fa-black-hole"></i> Centang Blackhole ${hasBlack ? '✓' : ''}
      </button>`;
    }
    userBadgeHtml += `</div></div>`;
  }
  document.getElementById("userBadgeManager").innerHTML = userBadgeHtml || '<p class="empty-state">Belum ada user</p>';
  
  // Item management
  if(!globalData || Object.keys(globalData).length === 0) {
    container.innerHTML = '<div class="empty-state">Belum ada item</div>';
    return;
  }
  let itemsHtml = `<h4 style="margin-top:20px;"><i class="fas fa-database"></i> Kelola Item</h4>`;
  for(let [id, item] of Object.entries(globalData)) {
    let canDelete = false;
    if(currentAdminLevel === 'blackhole') canDelete = true;
    if(currentAdminLevel === 'gold' && !blackholeUsers.has(item.user)) canDelete = true;
    itemsHtml += `
      <div class="admin-card">
        <div style="display:flex; gap:12px; align-items:center; margin-bottom:12px;">
          <img src="${item.img}" style="width:55px; height:55px; border-radius:16px; object-fit:cover;">
          <div><small>👤 ${escapeHtml(item.user)}</small><br><small>🆔 ${id.slice(0,8)}</small></div>
        </div>
        <input type="text" id="name-${id}" value="${escapeAttr(item.name)}" placeholder="Nama item">
        <textarea id="desc-${id}" placeholder="Deskripsi">${escapeAttr(item.desc || '')}</textarea>
        <select id="cat-${id}">${['Rocket','Tank','Pesawat','Satellite','Kapal Bawah Laut'].map(c => `<option ${item.cat===c?'selected':''}>${c}</option>`).join('')}</select>
        <input type="text" id="link-${id}" value="${escapeAttr(item.link)}" placeholder="Link">
        <input type="file" id="img-${id}" accept="image/*">
        <div class="admin-actions">
          <button class="btn-primary" onclick="updateItem('${id}')">Simpan</button>
          ${canDelete ? `<button class="btn-danger" onclick="deleteItem('${id}')">Hapus</button>` : '<button class="btn-secondary" disabled>🔒 Tidak bisa hapus</button>'}
          <button class="btn-secondary" onclick="removeImageOnly('${id}')">Hapus Gambar</button>
        </div>
      </div>
    `;
  }
  container.innerHTML = itemsHtml;
}

window.giveBadge = async function(user, type) {
  if(type === 'blue') {
    if(blueUsers.has(user)) await blueBadgeRef.child(user).remove();
    else await blueBadgeRef.child(user).set(true);
  } else if(type === 'gold') {
    if(currentAdminLevel === 'blackhole' || currentAdminLevel === 'gold') {
      if(goldUsers.has(user)) await goldBadgeRef.child(user).remove();
      else await goldBadgeRef.child(user).set(true);
    } else { alert("Tidak bisa memberikan centang Gold!"); return; }
  } else if(type === 'blackhole') {
    if(currentAdminLevel === 'blackhole') {
      if(blackholeUsers.has(user)) await blackholeBadgeRef.child(user).remove();
      else await blackholeBadgeRef.child(user).set(true);
    } else { alert("Hanya Blackhole Owner yang bisa memberikan centang Blackhole!"); return; }
  }
  alert(`Centang ${type.toUpperCase()} untuk @${user} berhasil diupdate!`);
  buildAdminUI();
  filterAndRender();
};

window.updateItem = function(id) {
  const newName = document.getElementById(`name-${id}`).value.trim();
  const newDesc = document.getElementById(`desc-${id}`).value;
  const newCat = document.getElementById(`cat-${id}`).value;
  const newLink = document.getElementById(`link-${id}`).value.trim();
  const file = document.getElementById(`img-${id}`).files[0];
  const current = globalData[id];
  if(!newName) return alert("Nama wajib!");
  const update = (img) => db.child(id).update({ name:newName, desc:newDesc, cat:newCat, link:newLink||"#", img:img!==undefined?img:current.img });
  if(file) { let r=new FileReader(); r.onload=e=>update(e.target.result); r.readAsDataURL(file); }
  else update();
  alert("Item diperbarui!");
};
window.deleteItem = function(id) { if(confirm("Hapus permanen?")) db.child(id).remove(); };
window.removeImageOnly = function(id) { if(confirm("Hapus gambar?")) db.child(id).update({ img:"https://placehold.co/600x400?text=No+Image" }); };
function closeAdd() { document.getElementById("addModal").style.display = "none"; }
function closeAdmin() { document.getElementById("adminModal").style.display = "none"; }
function escapeAttr(str) { if(!str) return ''; return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.getElementById("search").addEventListener("input", filterAndRender);
document.querySelector("header div:last-child").onclick = () => document.getElementById("addModal").style.display = "flex";
document.querySelector("header div:first-child").onclick = openAdmin;
window.closeAdd = closeAdd; window.closeAdmin = closeAdmin; window.openAdmin = openAdmin;
window.closeLoginModal = closeLoginModal; window.login = login; window.addData = addData;
window.onclick = (e) => { if(e.target.classList?.contains('modal')) e.target.style.display = "none"; };
filterAndRender();
</script>
